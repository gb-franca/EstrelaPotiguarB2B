<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estrela Potiguar — Painel de Controle Turístico (Estático)</title>
  <meta name="description" content="Painel administrativo interativo para monitoramento de rotas e atrações celestes do turismo do Rio Grande do Norte.">
  <link rel="icon" type="image/svg+xml" href="assets/logo/estrela-mark.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: var(--surface-canvas);
    }
    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    /* Simple custom scrollbar for dashboard sections */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: var(--radius-full);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- React 18 & Babel via CDN -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design System Bundle -->
  <script src="_ds_bundle.js"></script>

  <!-- Sample Attractions and Categories -->
  <script src="ui_kits/mapa/data.js"></script>

  <!-- Modular React UI components with Babel parsing -->
  <script type="text/babel" src="ui_kits/mapa/icons.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>

  <!-- Root Mounting script -->
  <script type="text/babel">
    const { DashboardApp } = window;
    ReactDOM.createRoot(document.getElementById('app')).render(<DashboardApp />);
  </script>
</body>
</html>
