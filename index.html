<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/estrela-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estrela Potiguar — Painel de Controle Turístico</title>
    <meta name="description" content="Painel administrativo interativo para monitoramento de rotas e atrações celestes do turismo do Rio Grande do Norte.">
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

        height: 100%;

      ::-webkit-scrollbar {

      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-strong);
      }
